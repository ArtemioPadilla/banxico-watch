<?xml version="1.0" encoding="UTF-8"?>
<!--
  Inceptor scaffold brand mark.

  Three nodes arranged on a circle, connected by curved arrows that trace
  the Inceptor loop: open → branch → merge → (back to open). The
  central dot is the "spark" — a new issue arriving. Emerald accent on
  near-black surface matches the existing brand color (#10b981 emerald-500).

  The mark is 512×512 with a 96-unit corner radius so it works as a
  maskable PWA icon (safe zone ~80% of canvas, well inside the 102-unit
  inset = ~20% margin recommended by spec.app/maskable).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.6" stop-color="#10b981"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square surface -->
  <rect width="512" height="512" rx="96" fill="url(#surface)"/>

  <!-- Outer guide ring (very faint — visual structure) -->
  <circle cx="256" cy="256" r="160"
          fill="none" stroke="#10b981" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Three arc segments forming the loop. Each arc spans 100°, leaving
       20° gaps for the arrowheads to live. Arcs go counter-clockwise to
       suggest forward motion (top → bottom-right → bottom-left → top). -->
  <g fill="none" stroke="#10b981" stroke-width="14" stroke-linecap="round">
    <!-- Arc 1: 12 o'clock → 4 o'clock (issue → branch) -->
    <path d="M 256 96
             A 160 160 0 0 1 394.56 336" stroke-opacity="0.95"/>
    <!-- Arc 2: 4 o'clock → 8 o'clock (branch → merge) -->
    <path d="M 372.79 372.79
             A 160 160 0 0 1 117.44 336" stroke-opacity="0.75"/>
    <!-- Arc 3: 8 o'clock → 12 o'clock (merge → next issue) -->
    <path d="M 139.21 372.79
             A 160 160 0 0 1 234.21 99.51" stroke-opacity="0.55"/>
  </g>

  <!-- Three nodes at arc endpoints -->
  <g fill="#10b981">
    <circle cx="256" cy="96" r="18"/>
    <circle cx="394.56" cy="336" r="18" fill-opacity="0.8"/>
    <circle cx="117.44" cy="336" r="18" fill-opacity="0.6"/>
  </g>

  <!-- Central spark — the issue catalyst -->
  <circle cx="256" cy="256" r="56" fill="url(#spark)"/>
  <circle cx="256" cy="256" r="22" fill="#34d399"/>

</svg>
