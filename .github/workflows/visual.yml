name: Visual regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One run per branch (see ci.yml — audit Wave 1b).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Astro (required before preview server)
        run: npm run build

      # Gating since 2026-06: baselines are captured in the same Linux image CI
      # uses (scripts/refresh-baselines.sh), so diffs are real regressions.
      - name: Run Playwright visual tests
        id: pw
        run: npx playwright test

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload current snapshots so they can be promoted to baselines
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-snapshots
          path: test-results/**/*-actual.png
          if-no-files-found: ignore
          retention-days: 14
