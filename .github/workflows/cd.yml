name: CD — Deploy to production (template)

# MANUAL ONLY. The real production deploy is deploy.yml (GitHub Pages), which
# fires on push to main. This workflow is a copy-me template for forks that
# deploy elsewhere (Firebase / Vercel / Netlify / Cloudflare). It used to also
# run on push to main, where its placeholder `echo` step reported a misleading
# green "deploy" on every commit. It's now dispatch-only so it never races
# deploy.yml or fakes a successful deploy. Wire your provider in the last step,
# then add a push trigger back if this becomes your real deploy.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_BUILD_SHA: ${{ github.sha }}
          PUBLIC_VERSION: ${{ github.ref_name }}
      # Replace this step with your preferred hosting provider
      # Examples: Firebase, Vercel, Netlify, Cloudflare Pages
      - name: Deploy (configure your provider here)
        run: echo "Add your deploy step here — see SETUP.md"
