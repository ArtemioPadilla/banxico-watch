name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

# Single concurrent deployment — newer pushes cancel older runs in progress
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # GitHub *project* pages serve at `<domain>/<repo>/`, so the build
          # needs the repo name as its base path. Defaults to this repo's slug;
          # override with an ASTRO_BASE repo secret (e.g. set it to `/` if you
          # later move to a root/custom-domain user-pages deploy).
          ASTRO_BASE: ${{ secrets.ASTRO_BASE || '/inceptor' }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
